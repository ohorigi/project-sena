<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세븐나이츠 PVE 공략</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Cinzel:wght@700;900&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0a0a0f;
    --dark2: #12121a;
    --dark3: #1a1a28;
    --panel: rgba(15,15,25,0.92);
    --border: rgba(201,168,76,0.3);
    --text: #e8e0d0;
    --text-dim: #8a7a6a;
    --blue: #4a8fd4;
    --red: #d44a4a;
    --green: #4ad48a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== DASHBOARD ===== */
  #dashboard {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  #bg-image {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 0;
    opacity: 0.75;
    transition: opacity 0.3s;
  }

  #bg-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom,
      rgba(5,5,10,0.1) 0%,
      rgba(5,5,10,0.3) 40%,
      rgba(5,5,10,0.65) 100%);
    z-index: 1;
  }

  .dashboard-content {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Logo area */
  .logo-area {
    margin-top: 60px;
    text-align: center;
  }

  .game-logo {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--gold-light);
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 2px;
  }

  .game-logo-main {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 30px rgba(201,168,76,0.8), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1;
  }

  .rebirth-text {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 8px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.6);
    margin-top: 2px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    padding: 6px 20px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-top: 8px;
  }

  /* Main buttons */
  .main-buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    margin-top: 40px;
  }

  .main-btn {
    width: 100%;
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(20,20,35,0.95), rgba(30,25,50,0.95));
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .main-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    transition: left 0.5s;
  }

  .main-btn:hover::before { left: 100%; }

  .main-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    box-shadow: 0 0 20px rgba(201,168,76,0.2), inset 0 0 20px rgba(201,168,76,0.05);
    transform: translateY(-2px);
  }

  .main-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .main-btn.disabled:hover {
    transform: none;
    border-color: var(--border);
    color: var(--text);
    box-shadow: none;
  }

  .btn-icon {
    margin-right: 10px;
    font-size: 20px;
  }

  .coming-soon {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-left: 8px;
  }

  /* Edit button (bottom right) */
  #edit-btn {
    position: fixed;
    bottom: 28px;
    right: 20px;
    z-index: 10;
    background: linear-gradient(135deg, var(--gold), #8a5c1a);
    border: none;
    border-radius: 50px;
    color: #1a1000;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  #edit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.5);
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--dark);
    z-index: 100;
    overflow-y: auto;
  }
  .screen.active { display: block; }

  .screen-header {
    display: flex;
    align-items: center;
    padding: 16px;
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 18px;
    width: 38px; height: 38px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .screen-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    margin-left: 14px;
  }

  .screen-body {
    padding: 20px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ===== CHARACTER EDIT SCREEN ===== */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }

  .char-card {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--dark3);
    cursor: pointer;
  }

  .char-card img {
    width: 100%; height: 70%;
    object-fit: cover;
    display: block;
  }

  .char-card .char-name-tag {
    width: 100%;
    height: 30%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    background: var(--dark3);
    padding: 4px;
    text-align: center;
    word-break: keep-all;
  }

  .char-card-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .char-card:hover .char-card-overlay,
  .char-card.overlay-active .char-card-overlay {
    display: flex;
  }

  .overlay-btn {
    width: 80%;
    padding: 8px;
    border-radius: 4px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .overlay-btn.edit {
    background: var(--blue);
    color: #fff;
  }

  .overlay-btn.delete {
    background: var(--red);
    color: #fff;
  }

  .add-char-card {
    aspect-ratio: 3/4;
    border-radius: 6px;
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--text-dim);
    font-size: 32px;
  }

  .add-char-card:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .add-char-card span {
    font-size: 11px;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ===== MODAL ===== */
  .modal-bg {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.active { display: flex; }

  .modal {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .modal h3 {
    font-size: 15px;
    color: var(--gold-light);
    letter-spacing: 2px;
    margin-bottom: 18px;
    text-align: center;
  }

  .modal-img-upload {
    width: 100%;
    aspect-ratio: 1;
    border: 2px dashed var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 14px;
    overflow: hidden;
    position: relative;
    background: var(--dark3);
  }

  .modal-img-upload img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .modal-img-upload .upload-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-dim);
    font-size: 13px;
    gap: 8px;
  }

  .modal-img-upload .upload-placeholder .icon { font-size: 32px; }

  .modal input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input[type="text"]:focus { border-color: var(--gold); }
  .modal input[type="text"]::placeholder { color: var(--text-dim); }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btn.cancel {
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .modal-btn.confirm {
    background: linear-gradient(135deg, var(--gold), #8a5c1a);
    color: #1a1000;
  }

  /* ===== SIEGE SCREEN (공성전) ===== */
  .day-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 8px;
  }

  @media (max-width: 400px) {
    .day-buttons { grid-template-columns: repeat(3, 1fr); }
  }

  .day-btn {
    padding: 14px 6px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    letter-spacing: 1px;
  }

  .day-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
  }

  /* ===== DAY DETAIL SCREEN ===== */
  .day-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .day-header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
  }

  .day-top-image {
    width: 100%;
    aspect-ratio: 16/7;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--dark3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 18px;
    position: relative;
  }

  .day-top-image img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .day-top-image .upload-hint {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .day-top-image .upload-hint .icon { font-size: 28px; }

  .char-slot-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .char-slot {
    display: flex;
    gap: 8px;
    align-items: stretch;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
  }

  .slot-top-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    width: 100%;
  }

  /* 정사각형 크롭 이미지 + 이름 아래 */
  .slot-char-area {
    width: 80px;
    min-width: 80px;
    border-radius: 5px;
    border: 1px dashed var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--dark);
  }

  .slot-char-img-wrap {
    width: 80px;
    height: 60px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .slot-char-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;  /* 가운데 기준으로 크롭 */
  }

  .slot-char-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    width: 100%;
    padding: 3px 2px;
    background: var(--dark3);
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: keep-all;
    line-height: 1.2;
  }

  .slot-char-area .plus-icon {
    font-size: 26px;
    color: var(--text-dim);
  }

  .slot-char-area:hover { border-color: var(--gold); }

  .slot-comment {
    flex: 1;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 6px 8px;
    resize: none;
    min-height: 76px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .slot-comment:focus { border-color: var(--gold); }
  .slot-comment::placeholder { color: var(--text-dim); font-size: 12px; }

  /* 요일 배너 이미지 (슬롯 목록 위) */
  .day-banner-img {
    width: 100%;
    height: 100px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark3);
    margin-bottom: 10px;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .day-banner-img:hover { border-color: var(--gold); }
  .day-banner-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }
  .banner-plus-hint {
    font-size: 15px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 1px;
  }
  .banner-plus-hint span { font-size: 12px; }

  /* 하단 메모 영역 */
  .day-bottom-memo {
    margin-top: 10px;
    margin-bottom: 20px;
  }

  .day-bottom-memo label {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 5px;
  }

  .day-bottom-memo textarea {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .day-bottom-memo textarea:focus { border-color: var(--gold); }
  .day-bottom-memo textarea::placeholder { color: var(--text-dim); }

  /* Character Picker Modal */
  .char-picker-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-height: 60vh;
    overflow-y: auto;
    margin-bottom: 14px;
  }

  .picker-card {
    aspect-ratio: 3/4;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    background: var(--dark3);
    transition: all 0.2s;
  }

  .picker-card:hover, .picker-card.selected {
    border-color: var(--gold);
  }

  .picker-card img {
    width: 100%; height: 72%;
    object-fit: cover;
  }

  .picker-card .picker-name {
    height: 28%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    padding: 2px;
    word-break: keep-all;
  }

  /* Save indicator */
  .save-indicator {
    position: fixed;
    top: 70px;
    right: 16px;
    background: rgba(74,212,138,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .save-indicator.show { opacity: 1; }

  /* 보스 그리드 */
  .boss-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }

  .boss-card {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .boss-card:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
  }

  .add-boss-card {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 24px;
    color: var(--text-dim);
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .add-boss-card:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  .add-boss-card span { font-size: 11px; letter-spacing: 1px; }

  /* 라운드 화살표 - 3번째 슬롯 좌우 */
  .round-nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 6px 0;
    margin: 2px 0;
  }
  .round-arrow {
    background: none;
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 14px;
    width: 36px; height: 36px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .round-arrow:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }
  .round-arrow.disabled {
    opacity: 0.3;
    cursor: default;
  }
  .round-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    min-width: 80px;
    text-align: center;
  }

  /* 편집/삭제 모달 항목 */
  .boss-editdel-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
  }
  .boss-editdel-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .boss-editdel-btns {
    display: flex;
    gap: 8px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

<script>
// ===== STATE =====
let config = { owner: '', repo: '', token: '' };
let characters = [];
let siegeData = {};
let raidData = { bosses: [], bossData: {} };   // 강림원정대
let destData = { bosses: [], bossData: {} };   // 파괴신
let editingCharId = null;
let pendingCharImageData = null;
let currentDay = null;
let currentMode = 'siege'; // 'siege' | 'raid' | 'dest'
let currentBossId = null;
let currentRound = 1; // 1 or 2
let pickerTargetSlot = null;
let pickerSelectedCharId = null;
let editingBossId = null;
let editingBossMode = null;

const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DAY_NAMES = { monday:'월요일', tuesday:'화요일', wednesday:'수요일', thursday:'목요일', friday:'금요일', saturday:'토요일', sunday:'일요일' };

function makeEmptyRoundData() {
  return {
    headerImageUrl: null,
    memo: '',
    slots: Array(5).fill(null).map(() => ({charId:null, comment:''}))
  };
}

function makeEmptyBossData() {
  return { r1: makeEmptyRoundData(), r2: makeEmptyRoundData() };
}

// ===== 배경 이미지 세로/가로 전환 =====
function updateBgImage() {
  const img = document.getElementById('bg-image');
  if (!img) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  const newSrc = isPortrait ? 'seven_knights_bg2.jpg' : 'seven_knights_bg.jpg';
  if (img.src.indexOf(newSrc) === -1) {
    img.src = newSrc;
  }
}

window.addEventListener('resize', updateBgImage);
window.addEventListener('orientationchange', updateBgImage);

// ===== INIT =====
window.onload = function() {
  updateBgImage(); // DOM 준비 후 실행
  DAYS.forEach(d => {
    siegeData[d] = { headerImageUrl: null, topImageUrl: null, memo: '', slots: Array(5).fill(null).map(() => ({charId:null, comment:''})) };
  });

  const saved = localStorage.getItem('sk_config');
  if (saved) {
    config = JSON.parse(saved);
    document.getElementById('config-modal-bg').classList.remove('active');
    document.getElementById('cfg-cancel-btn').style.display = 'block';
    loadFromGitHub();
  } else {
    document.getElementById('config-modal-bg').classList.add('active');
  }
};

// ===== CONFIG =====
function openSettingsModal() {
  const modal = document.getElementById('config-modal-bg');
  const cancelBtn = document.getElementById('cfg-cancel-btn');
  const status = document.getElementById('cfg-status');
  // 기존 설정값 채워넣기
  if (config.owner) {
    document.getElementById('cfg-owner').value = config.owner;
    document.getElementById('cfg-repo').value = config.repo;
    document.getElementById('cfg-token').value = config.token;
    status.textContent = '✓ 현재 연결됨: ' + config.owner + '/' + config.repo;
    status.style.color = 'var(--green)';
    cancelBtn.style.display = 'block';
  } else {
    status.textContent = '';
    cancelBtn.style.display = 'none';
  }
  modal.classList.add('active');
}

function closeSettingsModal() {
  document.getElementById('config-modal-bg').classList.remove('active');
}

function saveConfig() {
  const owner = document.getElementById('cfg-owner').value.trim();
  const repo = document.getElementById('cfg-repo').value.trim();
  const token = document.getElementById('cfg-token').value.trim();
  if (!owner || !repo || !token) { showToast('모든 항목을 입력해주세요'); return; }
  config = { owner, repo, token };
  localStorage.setItem('sk_config', JSON.stringify(config));
  const status = document.getElementById('cfg-status');
  status.textContent = '연결 중...';
  status.style.color = 'var(--gold)';
  closeSettingsModal();
  loadFromGitHub();
}

// ===== GITHUB API =====
async function githubRequest(path, method, body) {
  const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
  const headers = {
    'Authorization': `token ${config.token}`,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github.v3+json'
  };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.ok ? res.json() : null;
}

async function loadFromGitHub() {
  showLoadingOverlay(true);
  try {
    // 캐릭터 로드
    const res1 = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data/characters.json`, {
      headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res1.ok) {
      const file = await res1.json();
      const jsonStr = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
      characters = JSON.parse(jsonStr).map(c => ({ id: c.id, name: c.name, imageUrl: c.imageUrl || null }));
    }

    // 공성전 로드
    const res2 = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data/siege.json`, {
      headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res2.ok) {
      const file = await res2.json();
      const loaded = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))));
      DAYS.forEach(d => {
        if (loaded[d]) {
          siegeData[d] = {
            headerImageUrl: loaded[d].headerImageUrl || null,
            topImageUrl: loaded[d].topImageUrl || null,
            memo: loaded[d].memo || '',
            slots: loaded[d].slots || Array(5).fill(null).map(() => ({charId:null, comment:''}))
          };
        }
      });
    }

    // 강림원정대 로드
    const res3 = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data/raid.json`, {
      headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res3.ok) {
      const file = await res3.json();
      raidData = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))));
    } else {
      raidData = { bosses: [], bossData: {} };
      await saveToGitHub('data/raid.json', raidData);
    }

    // 파괴신 로드
    const res4 = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data/dest.json`, {
      headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res4.ok) {
      const file = await res4.json();
      destData = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))));
    } else {
      destData = { bosses: [], bossData: {} };
      await saveToGitHub('data/dest.json', destData);
    }

    showToast('✓ 데이터 로드 완료');
  } catch(e) {
    showToast('⚠️ 로드 실패: ' + e.message);
    console.error(e);
  } finally {
    showLoadingOverlay(false);
  }
}

function showLoadingOverlay(show) {
  let overlay = document.getElementById('loading-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'loading-overlay';
    overlay.style.cssText = `
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(5,5,10,0.85); z-index:9999;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
    `;
    overlay.innerHTML = `
      <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="color:var(--gold-light);font-size:14px;letter-spacing:2px;">데이터 불러오는 중...</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    `;
    document.body.appendChild(overlay);
  }
  overlay.style.display = show ? 'flex' : 'none';
}

// 이미지를 GitHub에 별도 파일로 저장, 경로 반환
async function saveImageToGitHub(imageData, filename) {
  try {
    // base64 헤더 제거 (data:image/jpeg;base64, 부분)
    const base64 = imageData.split(',')[1];
    const path = `data/images/${filename}`;
    const sha = await getFileSha(path);
    const body = {
      message: `Upload image ${filename}`,
      content: base64,
      ...(sha ? { sha } : {})
    };
    const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${config.token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      console.error('이미지 저장 실패:', err);
      return null;
    }
    // GitHub Raw URL 반환 (캐시 방지용 타임스탬프 추가)
    const ts = Date.now();
    return `https://raw.githubusercontent.com/${config.owner}/${config.repo}/main/data/images/${filename}?t=${ts}`;
  } catch(e) {
    console.error('이미지 저장 오류:', e);
    return null;
  }
}

async function getFileSha(path) {
  try {
    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`, {
      headers: {
        'Authorization': `token ${config.token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.sha || null;
  } catch { return null; }
}

async function saveToGitHub(path, data) {
  try {
    // 한글 안깨지는 인코딩: TextEncoder 방식
    const jsonStr = JSON.stringify(data, null, 2);
    const bytes = new TextEncoder().encode(jsonStr);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const content = btoa(binary);

    const sha = await getFileSha(path);
    const body = {
      message: `Update ${path}`,
      content,
      ...(sha ? { sha } : {})
    };
    const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${config.token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showToast('⚠️ 저장 실패: ' + (err.message || res.status));
      console.error('저장 실패:', err);
      return false;
    }
    showSaveIndicator();
    return true;
  } catch(e) {
    showToast('⚠️ 저장 오류: ' + e.message);
    console.error(e);
    return false;
  }
}

// ===== SCREENS (history API 연동) =====
// 현재 열린 화면 스택
let screenStack = [];

function openScreen(id) {
  document.getElementById(id).classList.add('active');
  screenStack.push(id);
  // history에 상태 추가 → 안드로이드 뒤로가기 감지용
  history.pushState({ screen: id }, '', '');
}

function closeScreen(id) {
  document.getElementById(id).classList.remove('active');
  screenStack = screenStack.filter(s => s !== id);
}

// 안드로이드 뒤로가기 버튼 감지
window.addEventListener('popstate', function(e) {
  // 모달이 열려있으면 모달만 닫기
  const openModals = document.querySelectorAll('.modal-bg.active');
  if (openModals.length > 0) {
    openModals.forEach(m => m.classList.remove('active'));
    history.pushState({}, '', ''); // 스택 유지
    return;
  }

  // 열린 화면이 있으면 가장 최근 화면 닫기
  if (screenStack.length > 0) {
    const lastScreen = screenStack[screenStack.length - 1];
    document.getElementById(lastScreen).classList.remove('active');
    screenStack.pop();
    return;
  }

  // 메인화면에서 뒤로가기 → 종료 확인
  const confirmExit = confirm('앱을 종료하시겠습니까?');
  if (confirmExit) {
    history.back(); // 실제 뒤로가기 (앱 종료)
  } else {
    history.pushState({}, '', ''); // 취소 시 스택 복원
  }
});

// ===== 이미지 압축 함수 =====
function compressImage(file, maxWidth, maxHeight, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth || h > maxHeight) {
          const ratio = Math.min(maxWidth / w, maxHeight / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  compressImage(file, 600, 800, 0.92).then(compressed => {

  grid.innerHTML = '';
  if (characters.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;grid-column:1/-1;padding:20px;">등록된 캐릭터가 없습니다.<br>먼저 캐릭터를 추가해주세요.</div>';
  } else {
    characters.forEach(char => {
      const card = document.createElement('div');
      card.className = 'picker-card' + (char.id === pickerSelectedCharId ? ' selected' : '');
      const imgSrc = char.imageUrl || char.imageData || '';
      card.innerHTML = `<img src="${imgSrc}" alt="${char.name}"><div class="picker-name">${char.name}</div>`;
      card.onclick = () => {
        document.querySelectorAll('.picker-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        pickerSelectedCharId = char.id;
      };
      grid.appendChild(card);
    });
  }
  document.getElementById('picker-modal-bg').classList.add('active');
}

function closePickerModal() {
  document.getElementById('picker-modal-bg').classList.remove('active');
}

function confirmPickerSelection() {
  if (pickerSelectedCharId !== null && pickerTargetSlot !== null) {
    siegeData[currentDay].slots[pickerTargetSlot].charId = pickerSelectedCharId;
    saveSiegeData();
    renderCharSlots();
  }
  closePickerModal();
}
</script>
</body>
</html>
